version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: swiftcart-db
    restart: always
    environment:
      POSTGRES_USER: swiftcart_admin
      POSTGRES_PASSWORD: swiftcart_secure_pass
      POSTGRES_DB: swiftcart_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: swiftcart-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://swiftcart_admin:swiftcart_secure_pass@postgres:5432/swiftcart_db?schema=public
      - PORT=5000
      - JWT_ACCESS_SECRET=swiftcart_jwt_access_secret_key_123!
      - JWT_REFRESH_SECRET=swiftcart_jwt_refresh_secret_key_987!
      - STRIPE_SECRET_KEY=sk_test_mock_stripe_key_swiftcart
      - CLOUDINARY_CLOUD_NAME=mock_cloudinary
      - CLOUDINARY_API_KEY=mock_api_key
      - CLOUDINARY_API_SECRET=mock_api_secret
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_USER=mock_user
      - EMAIL_PASS=mock_pass
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: swiftcart-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_STRIPE_PUBLISHABLE_KEY=pk_test_mock_stripe_publishable_key
    depends_on:
      - backend

volumes:
  pgdata:
